name: Run Postman Tests

on:
  push:
    branches: [ "main" ]
  schedule:
    - cron: "0 16 * * *"   

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Install Newman
        run: npm install -g newman newman-reporter-htmlextra

      - name: Run collection
        run: |
          mkdir -p docs
          newman run Postman/GYM_E2E_FLOW.postman_collection.json \
            -e Postman/dev.postman_environment.json \
            --env-var "apikey=${{ secrets.API_KEY }}" \
            --reporters cli,htmlextra \
            --reporter-htmlextra-export docs/report.html

      - name: Commit report to repo
        run: |
          git config user.name "github-actions"
          git config user.email "github-actions@github.com"
          git add docs/report.html
          git commit -m "chore: update postman report" || echo "no changes"
          git push
